services:
  - type: web
    name: marineiq-backend
    env: docker
    region: ohio
    plan: free
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    envVars:
      - key: SUPABASE_URL
        sync: false # Render will ask you for this
      - key: SUPABASE_KEY
        sync: false # Render will ask you for this
      - key: GEMINI_API_KEY
        sync: false # Render will ask you for this
      - key: FRONTEND_URL
        fromService:
          type: web
          name: marineiq-frontend
          envVarKey: RENDER_EXTERNAL_URL

  - type: web
    name: marineiq-frontend
    env: docker
    region: ohio
    plan: free
    dockerContext: ./frontend
    dockerfilePath: ./frontend/Dockerfile
    envVars:
      - key: NEXT_PUBLIC_API_URL
        fromService:
          type: web
          name: marineiq-backend
          envVarKey: RENDER_EXTERNAL_URL
      - key: NEXT_PUBLIC_SUPABASE_URL
        sync: false # Render will ask you for this
      - key: NEXT_PUBLIC_SUPABASE_ANON_KEY
        sync: false # Render will ask you for this
